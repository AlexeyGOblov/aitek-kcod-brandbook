<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="360" viewBox="0 0 1180 360" font-family="Segoe UI, Arial, sans-serif">
<rect width="1180" height="360" fill="#fff"/>
<text x="40" y="44" font-size="#0d1d2b" font-weight="800" fill="17" text-anchor="start">ТОЛЩИНА ШТРИХА И ПРОСВЕТ</text>
<text x="40" y="68" font-size="#6e8296" font-weight="600" fill="13" text-anchor="start">вид сверху на стену: тонкое тонет в тенях скатов - буквы рвутся и слипаются</text>
<polyline points="40.0,150.0 65.2,150.0 85.0,116.0 110.2,116.0 130.0,150.0 130.0,150.0 155.2,150.0 175.0,116.0 200.2,116.0 220.0,150.0 220.0,150.0 245.2,150.0 265.0,116.0 290.2,116.0 310.0,150.0 310.0,150.0 335.2,150.0 355.0,116.0 380.2,116.0 400.0,150.0 400.0,150.0 425.2,150.0 445.0,116.0 470.2,116.0 490.0,150.0 490.0,150.0 515.2,150.0 535.0,116.0 560.2,116.0 580.0,150.0 580.0,150.0 605.2,150.0 625.0,116.0 650.2,116.0 670.0,150.0 670.0,150.0 695.2,150.0 715.0,116.0 740.2,116.0 760.0,150.0" fill="none" stroke="#0d1d2b" stroke-width="2.5" stroke-linejoin="round"/>
<rect x="95" y="108" width="7" height="80" fill="#6e8296" opacity="0.45"/>
<text x="98" y="214" font-size="24" fill="#b23b3b" text-anchor="middle" font-weight="800">✕</text>
<text x="98" y="238" font-size="12" font-weight="700" fill="#b23b3b" text-anchor="middle">тонкий - тонет</text>
<rect x="346" y="108" width="34" height="80" fill="#fff" stroke="#0d1d2b" stroke_width="2"/>
<text x="363" y="214" font-size="24" fill="#2f9e5b" text-anchor="middle" font-weight="800">✓</text>
<text x="363" y="238" font-size="12" font-weight="700" fill="#2f9e5b" text-anchor="middle">толстый - виден</text>
<rect x="40" y="250" width="1100" height="86" rx="4" fill="#eef4f9" stroke="#dce6ef"/>
<text x="60" y="282" font-size="#0d1d2b" font-weight="700" fill="14" text-anchor="start">Штрих букв и просвет между ними - не тоньше плоской грани волны (мерка - сама волна, не сантиметры).</text>
<text x="60" y="310" font-size="#0e8fe0" font-weight="700" fill="13.5" text-anchor="start">Отсюда: самое жирное начертание и чуть более широкие промежутки. Мелкие надписи на гофре - осторожно.</text>
</svg>